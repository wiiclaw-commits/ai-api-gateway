version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: openclaw-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: openclaw
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password}
      POSTGRES_DB: openclaw_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openclaw -d openclaw_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - openclaw-network

  # Redis 缓存（用于分布式速率限制）
  redis:
    image: redis:7-alpine
    container_name: openclaw-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - openclaw-network

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-api-gateway
    restart: unless-stopped
    environment:
      # 数据库配置
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: openclaw_dev
      DB_USER: openclaw
      DB_PASSWORD: ${DB_PASSWORD:-secure_password}
      DB_POOL_SIZE: 20

      # Redis 配置
      REDIS_HOST: redis
      REDIS_PORT: 6379

      # JWT 配置
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      JWT_EXPIRES_IN: 24h

      # 管理员配置
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@openclaw.dev}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}

      # AI Provider 配置
      BAILIAN_BASE_URL: https://coding.dashscope.aliyuncs.com/v1
      BAILIAN_API_KEY: ${BAILIAN_API_KEY}
      OPENAI_BASE_URL: https://api.openai.com/v1
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_BASE_URL: https://api.anthropic.com/v1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEEPSEEK_BASE_URL: https://api.deepseek.com/v1
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}

      # 日志
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # OpenClaw 配置
      OPENCLAW_HOME: ${OPENCLAW_HOME:-/root/.openclaw}
    volumes:
      - ./logs:/app/logs
      - ${OPENCLAW_HOME:-~/.openclaw}:/root/.openclaw:ro
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - openclaw-network

  # Web Frontend (开发环境)
  web-frontend:
    image: node:20-alpine
    container_name: openclaw-frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../web-frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - api-gateway
    networks:
      - openclaw-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  openclaw-network:
    driver: bridge
